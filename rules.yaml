# ============================================================
# 小红书合规规则配置
# 三类规则：违禁词、行业红线、平台规范
# 支持热更新：修改后无需重启即可生效
# ============================================================

rules:
  # ========== 一、广告法违禁词（绝对化用语）==========
  - id: AD-001
    category: 违禁词
    severity: error
    pattern: "(最[好棒佳强厉害大]|最好|最佳|最大|最高|最低|最便宜|最受欢迎|第一|首个|唯一|独家|国家级|世界级|顶级|极品|全网|全国第一)"
    description: "广告法禁止使用绝对化用语"
    suggestion: "替换为具体数据描述，如'经过X次测试'、'在XX榜单排名前3'"

  - id: AD-002
    pattern: "(销量第一|排名第一|冠军|领导品牌|第一品牌)"
    category: 违禁词
    severity: error
    description: "禁止使用市场地位绝对化宣称"
    suggestion: "改为'广受好评'、'人气推荐'等主观表达"

  # ========== 二、虚假/误导性用语 ==========
  - id: FALSE-001
    pattern: "(100%|百分百|永不|绝不|完全|彻底|根治|根除|治愈|治疗|药到病除)"
    category: 虚假宣传
    severity: error
    description: "禁止使用绝对承诺性用语"
    suggestion: "改为'有助于改善'、'帮助缓解'等温和表述"

  - id: FALSE-002
    pattern: "(立竿见影|瞬间|立刻|马上见效|秒变|7天见效|3天.*白|一周.*瘦)"
    category: 虚假宣传
    severity: error
    description: "禁止使用即时见效的夸大承诺"
    suggestion: "说明见效需要的时间范围，并加上'因人而异'提示"

  # ========== 三、行业红线 — 美妆护肤 ==========
  - id: BEAUTY-001
    pattern: "(美白|祛斑|祛痘|去痘|祛疤|祛皱|抗皱|去皱|除皱|防晒|瘦脸|丰胸|隆胸|脱毛|祛痣)"
    category: 行业红线
    severity: error
    description: "化妆品禁止宣称医疗功效或特殊用途（需特证）"
    suggestion: "改为'提亮肤色'、'保湿滋润'、'紧致肌肤'等合规表述"

  - id: BEAUTY-002
    pattern: "(消炎|杀菌|抑菌|抗菌|抗敏|修复细胞|修复DNA|再生|细胞再生)"
    category: 行业红线
    severity: error
    description: "化妆品禁止宣称医疗/药用功效"
    suggestion: "改为'舒缓肌肤'、'温和呵护'、'滋养修护'（非医疗语境）"

  # ========== 四、行业红线 — 食品/保健品 ==========
  - id: FOOD-001
    pattern: "(减肥|减脂|瘦身|燃脂|溶脂|排油|减重|掉秤.*斤)"
    category: 行业红线
    severity: error
    description: "食品禁止宣传减肥功效"
    suggestion: "改为'健康轻食'、'均衡营养'等合规表述"

  - id: FOOD-002
    pattern: "(降血压|降血糖|降血脂|降尿酸|抗癌|防癌|抗衰老|延年益寿|增强免疫力)"
    category: 行业红线
    severity: error
    description: "食品禁止宣传疾病预防/治疗功效"
    suggestion: "删除功效宣称，仅描述产品成分和口味"

  # ========== 五、平台规范 — 导流与违规行为 ==========
  - id: PLAT-001
    pattern: "(加微信|加V|加v|微信号|VX|vx|wx:|微信:|扫码添加|私信.*送|私我|私聊|扣1|评论区.*送|评论.*抽)"
    category: 平台规范
    severity: error
    description: "禁止导流至微信等站外平台"
    suggestion: "删除导流信息，引导用户在小红书内互动"

  - id: PLAT-002
    pattern: '(链接在|链接见|戳链接|点击链接|tb\d|淘宝|天猫|京东|拼多多|店铺名.*搜|在某宝|某东)'
    category: 平台规范
    severity: warning
    description: "禁止明显的站外电商导流"
    suggestion: "删除电商平台名称，可在个人主页设置店铺链接"

  - id: PLAT-003
    pattern: '(二维码|扫码|扫一扫|识别二维码|手机号|\d{11})'
    category: 平台规范
    severity: error
    description: "禁止发布联系方式"
    suggestion: "删除手机号/二维码，通过平台私信联系"

  # ========== 六、内容质量规范 ==========
  - id: QUAL-001
    pattern: "(转发.*抽奖|关注.*抽奖|点赞.*抽奖|收藏.*抽奖|抽.*送|揪.*位)"
    category: 平台规范
    severity: warning
    description: "抽奖互动需遵守平台规则，可能被判定为诱导互动"
    suggestion: "确认抽奖活动符合平台最新规则，建议走官方抽奖工具"

  - id: QUAL-002
    pattern: "(最.*之一|全网.*唯一|只有.*才|只有.*知道|没人告诉|别再.*了|后悔.*知道|错过.*亏)"
    category: 内容质量
    severity: warning
    description: "标题党/焦虑营销句式，可能被平台限流"
    suggestion: "改为正向表达，突出内容价值而非制造焦虑"
